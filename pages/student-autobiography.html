    <h1>大學生自傳範例：實習、獎學金、研究所都能改的四段式寫法</h1>
    <p>自傳不是流水帳。好的自傳會把背景、動機、能力證據和未來規劃串起來，讓審查者看見你和申請目標的關聯。</p>
    <h2>四段式架構</h2>
    <ul><li>第一段：科系背景與申請原因。</li><li>第二段：課程、專題或活動中的能力證據。</li><li>第三段：申請目標和過去經驗的連結。</li><li>第四段：錄取後的學習或貢獻規劃。</li></ul>
    <h2>範例句</h2>
    <div class="article-box"><p>我在大學期間逐漸確認自己對資料整理與問題分析的興趣。透過課程專題與團隊報告，我學會先釐清問題，再用資料支持判斷，而不是只憑直覺完成作業。</p></div>
