    <h1>獎學金申請文件怎麼準備：自傳、成績單、證明與檢查清單</h1>
    <p>獎學金審查通常看三件事：資格是否符合、文件是否完整、申請理由是否和獎學金宗旨相符。</p>
    <h2>基本文件</h2>
    <ul><li>申請表與切結書。</li><li>成績單與在學證明。</li><li>自傳或申請動機。</li><li>收入、清寒、服務或特殊表現證明。</li></ul>
    <h2>自傳重點</h2>
    <p>不要只寫需要錢。更完整的寫法是說明目前狀況、過去努力、未來規劃，以及這筆獎學金會如何幫助你持續完成學業。</p>
