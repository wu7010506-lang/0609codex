    <h1>研究所推甄備審怎麼準備：專題摘要、自傳與讀書計畫</h1>
    <p>研究所備審資料要讓教授快速看懂你的學習軌跡、研究興趣和未來方向。資料順序比裝飾更重要。</p>
    <h2>建議順序</h2>
    <ul><li>個人簡歷。</li><li>自傳與申請動機。</li><li>專題或研究摘要。</li><li>讀書計畫。</li><li>成績、證照與其他證明。</li></ul>
    <h2>專題摘要</h2>
    <p>用問題、方法、成果、你的貢獻四個小標呈現。避免只放大量截圖，應該清楚標出自己負責的部分。</p>
